<svg xmlns="http://www.w3.org/2000/svg" width="144" height="144" viewBox="0 0 144 144">
  <rect width="144" height="144" fill="#1a1a2e"/>
  <!-- Pencil body -->
  <g transform="translate(72,72) rotate(-45)">
    <rect x="-8" y="-40" width="16" height="60" rx="2" fill="#e94560"/>
    <!-- Pencil tip -->
    <polygon points="-8,20 8,20 0,36" fill="#f5c542"/>
    <!-- Eraser -->
    <rect x="-8" y="-48" width="16" height="8" rx="2" fill="#f5c542"/>
  </g>
  <!-- Label -->
  <text x="72" y="130" text-anchor="middle" font-family="SF Pro,Helvetica,sans-serif" font-size="14" font-weight="600" fill="#ffffff">DRAW</text>
</svg>
